# ─────────────────────────────────────────────────────────
# Expensio — Netlify configuration
# Connect this GitHub repo to Netlify → auto-deploys on push
# ─────────────────────────────────────────────────────────

[build]
  publish   = "."
  functions = "netlify/functions"

# ── Security & CORS headers ───────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options             = "DENY"
    X-Content-Type-Options      = "nosniff"
    Referrer-Policy             = "strict-origin-when-cross-origin"
    Permissions-Policy          = "camera=(), microphone=(), geolocation=()"
    # Required for Google Auth popup to work
    Cross-Origin-Opener-Policy  = "same-origin-allow-popups"

# HTML — never cache (instant updates on deploy)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Service Worker — must never be cached
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control          = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

# Manifest
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type  = "application/manifest+json"

# Icons — cache forever (filenames include size)
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA fallback — all routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
