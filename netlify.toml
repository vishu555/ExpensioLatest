# ─────────────────────────────────────────────────────────
# Expensio — Netlify configuration
# Deploy: connect this GitHub repo to Netlify
# Netlify reads this file automatically on every git push
# ─────────────────────────────────────────────────────────

[build]
  publish   = "."          # root of repo is the site
  functions = "netlify/functions"

# ── Environment variable placeholders (set real values in
#    Netlify UI: Site config → Environment variables)
# [build.environment]
#   NODE_VERSION = "18"

# ── Security headers ──────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options             = "DENY"
    X-Content-Type-Options      = "nosniff"
    Referrer-Policy             = "strict-origin-when-cross-origin"
    Permissions-Policy          = "camera=(), microphone=(), geolocation=()"
    Cross-Origin-Opener-Policy  = "same-origin-allow-popups"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control          = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type  = "application/manifest+json"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── SPA fallback ──────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
